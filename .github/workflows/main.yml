name: Stock Scanner Bot

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Cài đặt công cụ nền để tránh lỗi pkg_resources
          pip install setuptools==69.5.1 wheel 
          # Cài đặt các thư viện chính từ kho chính thức (không dùng link GitHub)
          pip install pandas==2.0.3 pyTelegramBotAPI vnstock
          # Cài pandas-ta bản ổn định nhất hiện nay
          pip install pandas-ta==0.3.14b0

      - name: Execute Scanner
        env:
          TELEGRAM_TOKEN: ${{'8625301702:AAHLOJgz_fIkfA6WpU7Sr60KjRIzc7nmHR4'}}
          TELEGRAM_CHAT_ID: ${{'1736294695'}}
        run: |
          # Lệnh chạy bot và tự động sửa lỗi nếu thiếu thư viện lúc chạy
          python bot.py
