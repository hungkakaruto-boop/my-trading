name: run-bot

on:
  schedule:
    - cron: '15 2 * * 1-5' # 9:15 AM VN
    - cron: '15 7 * * 1-5' # 14:15 PM VN
  workflow_dispatch:

concurrency:
  group: stock-bot-group
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

       - name: 3. Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install vnstock pandas-ta pandas numpy pyTelegramBotAPI pytz ipython
   

      - name: 4. Execute Scanner
        env:
          TELEGRAM_TOKEN: '8625301702:AAHLOJgz_fIkfA6WpU7Sr60KjRIzc7nmHR4'
          TELEGRAM_CHAT_ID: '1736294695'
        run: python bot.py
