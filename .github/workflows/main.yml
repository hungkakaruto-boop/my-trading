name: Stock Scanner 5 Phút

on:
  schedule:
    # 2h UTC (9h VN) đến 8h UTC (15h VN)
    # */5 : Chạy mỗi 5 phút
    - cron: '*/5 2-8 * * 1-5'
  workflow_dispatch: # Cho phép bấm chạy tay để test

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyTelegramBotAPI vnstock
          pip install pandas-ta
      - name: Execute Scanner
        env:
          TELEGRAM_TOKEN: ${{'8625301702:AAHLOJgz_fIkfA6WpU7Sr60KjRIzc7nmHR4'}}
          TELEGRAM_CHAT_ID: ${{'1736294695'}}
        run: python bot.py
          
