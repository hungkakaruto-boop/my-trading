name: Stock Scanner Bot Final

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
schedule:
    - cron: '15 2 * * 1-5'  # 9h15 sáng (Giờ VN) từ Thứ 2 đến Thứ 6
    - cron: '15 7 * * 1-5'  # 14h15 chiều (Giờ VN) từ Thứ 2 đến Thứ 6
  workflow_dispatch:        # Cho phép bạn nhấn nút "Run workflow" bằng tay

# 2. QUAN TRỌNG NHẤT: Chế độ chống chạy đè (Concurrency)
# Nếu bạn lỡ tay bấm Run 2 lần, nó sẽ tự hủy cái cũ để tránh lặp tin nhắn
concurrency:
  group: stock-bot-group
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      # Bước 1: Lấy code từ kho lưu trữ về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài đặt Python phiên bản ổn định
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Tăng tốc độ cài đặt cho lần sau

      # Bước 3: Cài đặt các thư viện cần thiết
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pandas_ta vnstock pyTelegramBotAPI

      # Bước 4: Chạy Bot
      - name: Execute Scanner
        env:
          # Đảm bảo log xuất hiện ngay lập tức để theo dõi
          PYTHONUNBUFFERED: 1
        run: python bot.py
        env:
          TELEGRAM_TOKEN: ${{'8625301702:AAHLOJgz_fIkfA6WpU7Sr60KjRIzc7nmHR4'}}
          TELEGRAM_CHAT_ID: ${{'1736294695'}}
        run: |
          # Kiểm tra vị trí file trước khi chạy để tránh lỗi No such file
          echo "Checking files in directory:"
          ls -la
          if [ -f "bot.py" ]; then
            python bot.py
          else
            echo "LOI: Khong tim thay file bot.py. Hay kiem tra lai ten file tren GitHub!"
            exit 1
          fi
