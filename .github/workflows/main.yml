name: run-bot

on:
  schedule:
    # 9:15 sáng VN (Thứ 2 - Thứ 6)
    - cron: '15 2 * * 1-5'
    # 14:15 chiều VN (Thứ 2 - Thứ 6)
    - cron: '15 7 * * 1-5'
  workflow_dispatch:

# Chống chạy lặp tin nhắn: Nếu bấm Run 2 lần, cái cũ sẽ bị hủy để tránh nhiễu
concurrency:
  group: stock-bot-group
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 3. Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pandas_ta vnstock pyTelegramBotAPI

      - name: 4. Execute Scanner
        env:
          PYTHONUNBUFFERED: 1
          TELEGRAM_TOKEN: ${{'8625301702:AAHLOJgz_fIkfA6WpU7Sr60KjRIzc7nmHR4'}}
          TELEGRAM_CHAT_ID: ${{'1736294695'}}
        run: python bot.py
          fi
