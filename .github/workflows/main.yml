name: VN Stock Scanner v3.0

on:
  schedule:
    # Chạy lúc 08:15 UTC (tức 15:15 giờ Việt Nam) từ Thứ 2 đến Thứ 6
    - cron: '15 8 * * 1-5'
  
  # Cho phép bấm nút "Run workflow" chạy thủ công bất cứ lúc nào
  workflow_dispatch: 

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # Tăng tốc độ cài đặt ở các lần chạy sau

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scanner Script
      env:
        # Lấy Token và Chat ID từ GitHub Secrets
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python scanner.py
