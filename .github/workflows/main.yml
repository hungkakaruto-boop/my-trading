name: run-bot

on:
  schedule:
    - cron: '15 2 * * 1-5'
    - cron: '15 7 * * 1-5'
  workflow_dispatch:

concurrency:
  group: stock-bot-group
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Đã xóa dòng cache ở đây để hết lỗi

      - name: 3. Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pandas_ta vnstock pyTelegramBotAPI
