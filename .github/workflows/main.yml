name: VN Stock Scanner

on:
  schedule:
    - cron: "0 9 * * 1-5"   # 16h VN (sau giờ đóng cửa)
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: ⚙️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy==1.26.4 pandas==2.2.1 vnstock
          # Cài pandas-ta trực tiếp từ nguồn GitHub để tránh lỗi phiên bản
          pip install https://github.com/twopirllc/pandas-ta/archive/refs/heads/main.zip

    
      - name: 🚀 Run Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py

      - name: 🚀 Run Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scanner.py
