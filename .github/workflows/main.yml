# ==========================================
def main():
    now = datetime.now()
    bot.send_message(CHAT_ID, f"🚀 Bắt đầu quét {len(WATCHLIST)} mã...")
    
    start_date = (now - timedelta(days=90)).strftime('%Y-%m-%d')
    end_date = now.strftime('%Y-%m-%d')
    
    results = []
    for symbol in WATCHLIST:
        try:
            # DÙNG HÀM CHUẨN ĐỂ LẤY DATA VỚI API KEY
            df = stock.stock_historical_data(symbol=symbol, start_date=start_date, end_date=end_date, resolution='1D', type='stock')
            if df is None or df.empty: continue
            
            boss = UltimateBoss(df, symbol)
            res = boss.analyze()
            if res and res['score'] >= 7.5:
                msg = f"🔥 TÍN HIỆU: {res['symbol']} | Điểm: {res['score']}\n- Giá: {res['price']}\n- Dấu hiệu: {res['logs']}"
                bot.send_message(CHAT_ID, msg)
            time.sleep(1.1) # Tránh bị khóa API
        except: continue

    bot.send_message(CHAT_ID, "✅ Đã quét xong!")

if __name__ == "__main__":
    main()
