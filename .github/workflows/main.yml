name: Stock Scanner Bot

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.0.3 pyTelegramBotAPI vnstock
          pip install pandas-ta --no-dependencies
      - name: Execute Scanner
        env:
          TELEGRAM_TOKEN: ${{'8625301702:AAHLOJgz_fIkfA6WpU7Sr60KjRIzc7nmHR4'}}
          TELEGRAM_CHAT_ID: ${{'1736294695'}}
        run: |
          # Kiểm tra file bot.py có tồn tại không trước khi chạy
          if [ -f "bot.py" ]; then
            python bot.py
          else
            echo "Lỗi: Không tìm thấy file bot.py trong Repo!"
            exit 1
          fi
