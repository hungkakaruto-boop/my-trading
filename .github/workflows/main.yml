name: Stock Scanner Bot Final

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Bắt buộc dùng 3.12 để khớp với pandas-ta

      - name: Install Libs
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          # Cài các thư viện chính từ nguồn ổn định nhất
          pip install pandas pyTelegramBotAPI vnstock
          # Cài pandas-ta bản mới nhất phù hợp với Python 3.12
          pip install pandas-ta

      - name: Execute Scanner
        env:
          TELEGRAM_TOKEN: ${{8625301702:AAHLOJgz_fIkfA6WpU7Sr60KjRIzc7nmHR4}}
          TELEGRAM_CHAT_ID: ${{1736294695}}
        run: |
          # Kiểm tra vị trí file trước khi chạy để tránh lỗi No such file
          echo "Checking files in directory:"
          ls -la
          if [ -f "bot.py" ]; then
            python bot.py
          else
            echo "LOI: Khong tim thay file bot.py. Hay kiem tra lai ten file tren GitHub!"
            exit 1
          fi
